version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: harbour-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Unicesar+2026
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harbour-api
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=HarbourDB;User Id=sa;Password=Unicesar+2026;TrustServerCertificate=True;

volumes:
  sql_data: